<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h1>Employee Management System</h1>
    <input type="text" id="searchBox" placeholder="Search Employee"
onkeyup="searchEmployee()">
<h3 id="employeeCount">Total Employees: 0</h3>
<h3 id="salaryTotal">Total Salary: 0</h3>
    <div class="form-box">

        <input type="text" id="empId" placeholder="Employee ID">

        <input type="text" id="empName" placeholder="Employee Name">

        <input type="text" id="department" placeholder="Department">

        <input type="number" id="salary" placeholder="Salary">

        <button class="add-btn" onclick="addEmployee()">
    Add Employee
</button>

    </div>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="employeeTable">
        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
